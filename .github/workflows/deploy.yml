name: Build & Deploy to Amen

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate OAuth proxy
        run: |
          node -e "
            const fs = require('fs');
            let tpl = fs.readFileSync('oauth-template/index.php.template', 'utf8');
            tpl = tpl.replace('{{CLIENT_ID}}', process.env.GH_CLIENT_ID);
            tpl = tpl.replace('{{CLIENT_SECRET}}', process.env.GH_CLIENT_SECRET);
            fs.mkdirSync('public/oauth', { recursive: true });
            fs.writeFileSync('public/oauth/index.php', tpl);
          "
        env:
          GH_CLIENT_ID:     ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}

      - name: Build site
        run: npm run build

      - name: Deploy to Amen via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:          ${{ secrets.FTP_HOST }}
          username:        ${{ secrets.FTP_USERNAME }}
          password:        ${{ secrets.FTP_PASSWORD }}
          server-dir:      ${{ secrets.FTP_SERVER_DIR }}
          local-dir:       ./dist/
          exclude: |
            **/.git*
            **/.git*/**
